<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Prisicila&#39;s Eid Mubarak💙</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <!DOCTYPE html>
<html>
<head>
  <title>Eid Mubarak 🎉</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to right, #0f2027, #2c5364);
      color: white;
      text-align: center;
      font-family: Marhaban;
    }

    .container {
      margin-top: 100px;
      z-index: 2;
      position: relative;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
      color: gold;
      text-shadow: 2px 2px 8px #000000, 0 0 10px gold, 0 0 20px gold; /* added shadow behind Eid Mubarak */
      transition: text-shadow 0.3s ease;
    }

    h1:hover {
      text-shadow: 2px 2px 8px #000000, 0 0 15px gold, 0 0 30px gold, 0 0 45px gold;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: gold;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s all;
    }

    button:hover {
      box-shadow: 0 0 15px gold, 0 0 25px gold;
      transform: scale(1.05);
    }

    /* ✨ FADE-IN SECRET */
    #secret {
      opacity: 0;
      margin-top: 20px;
      font-size: 20px;
      color: #ffd700;
      transition: opacity 1s ease, text-shadow 0.3s ease;
    }

    #secret.show {
      opacity: 1;
    }

    #secret:hover {
      text-shadow: 0 0 15px gold, 0 0 25px gold;
    }

    .star {
      position: absolute;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1> Eid Mubarak🌙</h1>

    <p>Heyyy Pris,</p>
    <p>You're pretty great idk💙</p>

    <button onclick="showMessage()">Click me✨</button>

    <div id="secret">
      I know we've never met but you’re really one of my favorite people <br>
      stay amazing
    </div>
  </div>

  <!-- 🎵 MUSIC -->
  <audio id="music" autoplay loop>
    <source src="https://files.catbox.moe/0prarq.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById("music");
    music.volume = 0.3;

    // 🔁 autoplay or fallback
    window.onload = () => {
      music.play().catch(() => {
        document.addEventListener("click", startMusicOnce);
      });
    };

    function startMusicOnce() {
      music.play();
      document.removeEventListener("click", startMusicOnce);
    }

    // ✨ BUTTON ACTION
    function showMessage() {
      document.getElementById("secret").classList.add("show");
      confettiRain();
    }

    // ⭐ stars
    for (let i = 0; i < 60; i++) {
      let star = document.createElement("div");
      star.className = "star";
      star.style.left = Math.random() * 100 + "vw";
      star.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(star);
    }

    // 🎉 confetti rain
    function confettiRain() {
      for (let i = 0; i < 30; i++) {
        let confetti = document.createElement("div");
        confetti.style.position = "absolute";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-10px";
        confetti.style.width = "8px";
        confetti.style.height = "8px";
        confetti.style.background = ["gold", "white", "#ff4d4d", "#4dff88"][Math.floor(Math.random()*4)];
        confetti.style.pointerEvents = "none";
        document.body.appendChild(confetti);

        confetti.animate([
          { transform: "translateY(0)", opacity: 1 },
          { transform: `translateY(100vh) translateX(${Math.random()*100 - 50}px)`, opacity: 0 }
        ], {
          duration: Math.random() * 2000 + 2000,
          easing: "linear"
        });

        setTimeout(() => confetti.remove(), 4000);
      }
    }
  </script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
